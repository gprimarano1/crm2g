<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background com cantos arredondados para Apple touch icon -->
  <rect width="180" height="180" rx="40" fill="#0a0a0f"/>
  <!-- Halo externo no nó primário -->
  <circle cx="128" cy="90" r="60" fill="#5b6ef5" fill-opacity="0.08"/>
  <!-- Nó secundário -->
  <circle cx="44"  cy="90" r="24" fill="#5b6ef5" fill-opacity="0.50"/>
  <!-- Nó primário -->
  <circle cx="128" cy="90" r="37" fill="#5b6ef5"/>
  <!-- Linha de conexão -->
  <path d="M68 90h43" stroke="#5b6ef5" stroke-width="9" stroke-linecap="round" stroke-opacity="0.65"/>
</svg>
